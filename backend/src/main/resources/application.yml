server:
  port: 8080

spring:
  application:
    name: cupones-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

supabase:
  jwt-secret: ${SUPABASE_JWT_SECRET:your-supabase-jwt-secret}
  url: ${SUPABASE_URL:https://your-project.supabase.co}

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:5173}
